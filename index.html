<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 안내</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: white;
            display: flex;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 왼쪽 사이드바 --- */
        .sidebar {
            width: 28%;
            background-color: white;
            border-right: 1px solid #EEE;
            display: flex;
            flex-direction: column;
            padding: 50px 40px;
            flex-shrink: 0;
        }

        .logo-area {
            margin-bottom: 40px;
            text-align: left;
        }

        .logo-img {
            height: 30px;
            width: auto;
        }

        /* 시계 영역 */
        .clock-area {
            margin-bottom: 50px;
        }

        #current-date {
            font-size: 1.4rem;
            color: var(--text-sub);
            font-weight: 500;
            margin-bottom: 5px;
        }

        #current-time {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -2px;
            line-height: 1;
        }

        /* 안내 문구 영역 */
        .guide-area {
            flex: 1;
        }

        .guide-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--lotte-red);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title::after {
            content: "";
            flex: 1;
            height: 2px;
            background: #EEE;
        }

        .guide-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #444;
            word-break: keep-all;
        }

        /* 공지사항/WIFI (하단 고정) */
        .notice-area {
            background-color: #F9F9F9;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--lotte-red);
            flex-shrink: 0;
        }

        .notice-item { margin-bottom: 15px; }
        .notice-item:last-child { margin-bottom: 0; }

        .notice-label {
            font-size: 0.85rem;
            color: var(--lotte-red);
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
        }

        .notice-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            line-height: 1.4;
        }

        /* --- 오른쪽 메인 콘텐츠 --- */
        .main-content {
            width: 72%;
            padding: 30px 40px;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            justify-content: flex-start;
        }

        /* 비어있을 때 가운데 정렬을 위한 클래스 */
        .main-content.empty-mode {
            justify-content: center;
            align-items: center;
        }

        /* 등록된 과정 개수(1~5)에 따라 가로 높이 자동 분할 및 폰트 유동 조절 */
        .course-card {
            background: white;
            border-radius: 20px;
            padding: 0 40px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-top: 6px solid var(--lotte-red);
            flex-shrink: 0;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

        /* 1개일 때 */
        .count-1 .course-card { height: 100%; }
        .count-1 .title { font-size: 4.2rem !important; }
        .count-1 .info-row { font-size: 1.8rem !important; }
        .count-1 .room-info { min-height: 160px !important; }
        .count-1 .room-info p { font-size: 3.5rem !important; }
        .count-1 .direction-arrow { font-size: 8rem !important; }

        /* 2개일 때 */
        .count-2 .course-card { height: 48%; }
        .count-2 .title { font-size: 2.8rem; }
        .count-2 .info-row { font-size: 1.3rem; }

        /* 3개일 때 */
        .count-3 .course-card { height: 31%; }
        .count-3 .title { font-size: 2.4rem; }
        .count-3 .info-row { font-size: 1.15rem; }

        /* 4개일 때 */
        .count-4 .course-card { height: 23%; }
        .count-4 .title { font-size: 2.0rem; }
        .count-4 .info-row { font-size: 0.95rem; }
        .count-4 .card-bottom { margin-top: 10px !important; }
        .count-4 .room-info { min-height: 90px !important; padding: 10px 20px !important; }
        .count-4 .room-info p { font-size: 1.6rem !important; }
        .count-4 .direction-arrow { font-size: 4rem !important; }

        /* 5개일 때 */
        .count-5 .course-card { height: 18%; }
        .count-5 .title { font-size: 1.7rem; }
        .count-5 .info-row { font-size: 0.85rem; }
        .count-5 .card-bottom { margin-top: 5px !important; }
        .count-5 .room-info { min-height: 75px !important; padding: 5px 15px !important; }
        .count-5 .room-info p { font-size: 1.4rem !important; }
        .count-5 .direction-arrow { font-size: 3rem !important; }

        .card-top { flex: 1; padding: 20px 0; }

        .card-top .title {
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--text-main);
            line-height: 1.3;
            word-break: keep-all;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .card-top .info-group {
            display: flex;
            gap: 30px;
        }

        .card-top .info-row {
            font-size: 1.15rem;
            color: var(--text-sub);
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .card-top .info-label {
            color: var(--text-main);
            font-weight: 700;
            min-width: 80px;
            margin-right: 10px;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            padding: 15px 0;
            min-width: 320px;
        }

        .room-info {
            background: #FFF2F3; 
            border: 1px solid rgba(230, 0, 18, 0.08);
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 160px;
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .room-info span {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--lotte-red);
            display: block;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .room-info p {
            font-size: 2.0rem;
            font-weight: 800;
            color: #222;
            line-height: 1.2;
            word-break: keep-all;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .direction-arrow {
            flex-shrink: 0;
            width: 70px; 
            font-size: 5rem;
            color: var(--lotte-red);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="LOTTE GRS" class="logo-img">
        </div>

        <div class="clock-area">
            <div id="current-date">0000. 00. 00 (요일)</div>
            <div id="current-time">00:00</div>
        </div>

        <div class="guide-area">
            <div class="guide-title">7F 강의실 안내</div>
            <p class="guide-text">
                롯데지알에스 아카데미에 오신 것을 환영합니다.<br>
                오늘 진행되는 교육 과정과 강의실 위치를 확인해 주시기 바랍니다.
            </p>
        </div>

         <div class="notice-area">
            <div class="notice-item">
                <span class="notice-label">Wi-Fi</span>
                <p class="notice-value">ID : GRS_Academy_EXT<br>PW : grsacademy1!</p>
            </div>
            <div class="notice-item">
                <span class="notice-label">Information</span>
                <p class="notice-value">대표 번호 : 02-709-6920</p>
            </div>
        </div>
    </aside>

    <main class="main-content" id="courseContainer">
    </main>
</div>

<script>
    // ★ 구글 시트 ID 설정 (앱/로비와 동일한 통합 시트 ID)
    const SHEET_ID = '1T6gk3ediGcWimaS5EXVVxHnoqrW2aOdZJ5fGZVYVgLg';
    
    // 선 굵기를 3.5로 늘려 더 굵게 만들고 둥근 마감을 적용했습니다.
    const createArrow = (path) => `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="${path}"/></svg>`;
    
    // 화살표 머리를 컴팩트하게 조절하여 몸통(꼬리) 라인이 시각적으로 훨씬 길어 보이도록 좌표를 재설정했습니다.
    const arrowMap = {
        'left': createArrow('M22 12H2M2 12L7 17M2 12L7 7'),
        'right': createArrow('M2 12H22M22 12L17 17M22 12L17 7'),
        'up': createArrow('M12 22V2M12 2L7 7M12 2L17 7'),
        'straight': createArrow('M12 22V2M12 2L7 7M12 2L17 7'),
        'down': createArrow('M12 2V22M12 22L7 17M12 22L17 17')
    };

    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const week = ['일', '월', '화', '수', '목', '금', '토'][now.getDay()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('current-date').innerText = `${y}. ${m}. ${d} (${week})`;
        document.getElementById('current-time').innerText = `${hh}:${mm}`;
    }

    // Gviz 날짜 파싱 유틸리티
    function parseGvizDate(cell) {
        if (!cell) return '';
        if (cell.f) {
            return String(cell.f).replace(/\./g, '-').replace(/\s/g, '').substring(0, 10);
        }
        if (cell.v) {
            const val = String(cell.v);
            if (val.startsWith('Date(')) {
                const match = val.match(/Date\((\d+),(\d+),(\d+)/);
                if (match) {
                    const y = match[1];
                    const m = String(parseInt(match[2]) + 1).padStart(2, '0');
                    const d = String(match[3]).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }
            }
            return val.substring(0, 10);
        }
        return '';
    }

    // YYYY-MM-DD를 'M월 D일(요일)' 포맷으로 변환
    function formatToCustomDate(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length < 3) return dateStr;
        const month = parseInt(parts[1], 10);
        const day = parseInt(parts[2], 10);
        const dateObj = new Date(dateStr);
        const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()];
        return `${month}월 ${day}일(${dayOfWeek})`;
    }

    // 시간 포맷 변환 로직 ('09시 - 18시' 형식)
    function formatToCustomTime(startTimeCell, endTimeCell) {
        if (!startTimeCell || !endTimeCell) return '-';

        const extractHour = (cell) => {
            if (!cell) return '';
            if (cell.f && String(cell.f).includes(':')) {
                return String(cell.f).substring(0, 2);
            }
            if (cell.v) {
                const vStr = String(cell.v);
                if (vStr.includes(':')) return vStr.substring(0, 2);
                if (vStr.length >= 4) return vStr.substring(0, 2);
            }
            return '';
        };

        const sHour = extractHour(startTimeCell);
        const eHour = extractHour(endTimeCell);

        if (sHour && eHour) {
            return `${parseInt(sHour, 10)}시 - ${parseInt(eHour, 10)}시`;
        }
        
        const sVal = startTimeCell.f || startTimeCell.v || '';
        const eVal = endTimeCell.f || endTimeCell.v || '';
        if (sVal && eVal) {
            return `${String(sVal).substring(0,2)}시 - ${String(eVal).substring(0,2)}시`;
        }

        return '-';
    }

    // 구글 시트 데이터 로드 및 7층 필터링
    async function fetchSheetData() {
        try {
            const targetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=교육일정`;
            const response = await fetch(targetUrl);
            const text = await response.text();
            
            const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
            const data = JSON.parse(jsonStr);
            const rows = data.table.rows;

            // 기준일: 오늘 날짜
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`;

            let sevenFloorCourses = [];

            if (rows) {
                rows.forEach(row => {
                    if (!row || !row.c) return;
                    
                    const title = row.c[1] ? (row.c[1].v || row.c[1].f) : '';
                    const startDate = parseGvizDate(row.c[2]); 
                    const endDate = parseGvizDate(row.c[3]);
                    const startTimeCell = row.c[4];
                    const endTimeCell = row.c[5];
                    const floorVal = row.c[6] ? (row.c[6].v || row.c[6].f) : '';
                    const room = row.c[7] ? (row.c[7].v || row.c[7].f) : '';
                    const direction = row.c[8] ? (row.c[8].v || row.c[8].f) : 'right';
                    const status = row.c[10] ? (row.c[10].v || row.c[10].f) : '';

                    const is7Floor = String(floorVal).includes('7');

                    if (status === '예약' && is7Floor && startDate <= todayStr && todayStr <= endDate && sevenFloorCourses.length < 5) {
                        
                        const customPeriod = `${formatToCustomDate(startDate)} - ${formatToCustomDate(endDate)}`;
                        const customTime = formatToCustomTime(startTimeCell, endTimeCell);

                        sevenFloorCourses.push({
                            title: String(title),
                            period: customPeriod,
                            time: customTime,
                            room: String(room),
                            direction: String(direction).toLowerCase()
                        });
                    }
                });
            }

            renderDashboard(sevenFloorCourses);

        } catch (error) {
            console.error('데이터 로드 오류:', error);
            document.getElementById('courseContainer').innerHTML = `<div style="color:var(--lotte-red); text-align:center; font-size:1.5rem; font-weight:700; align-self:center;">데이터 동기화 실패. 구글 시트 뷰어 권한을 확인하세요.</div>`;
        }
    }

    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        
        if (courses.length === 0) {
            container.className = `main-content empty-mode`;
            container.innerHTML = `<div style="text-align:center; font-size:2rem; font-weight:700; color:#999;">현재 7층에서 진행 중인 교육 과정이 없습니다.</div>`;
            return;
        }

        container.className = `main-content count-${Math.min(courses.length, 5)}`;

        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.08}s">
                <div class="card-top">
                    <h2 class="title">${course.title}</h2>
                    <div class="info-group">
                        <div class="info-row">
                            <span class="info-label">교육 일정 :</span>
                            <span>${course.period || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">교육 시간 :</span>
                            <span>${course.time || '-'}</span>
                        </div>
                    </div>
                </div>
                <div class="card-bottom">
                    <div class="room-info">
                        <span>LECTURE ROOM</span>
                        <p>${course.room || '-'}</p>
                    </div>
                    <div class="direction-arrow">${arrowMap[course.direction] || arrowMap['right']}</div>
                </div>
            </div>
        `).join('');
    }

    updateClock();
    setInterval(updateClock, 1000);
    
    fetchSheetData();
    setInterval(fetchSheetData, 60000);
</script>

</body>
</html>
